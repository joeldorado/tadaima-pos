worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;
    client_max_body_size 25m;

    log_format cloudrun '$remote_addr - $http_x_forwarded_for [$time_local] '
                        '"$request" $status $body_bytes_sent';
    access_log /dev/stdout cloudrun;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    upstream php-fpm {
        server unix:/run/php-fpm.sock;
    }

    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name _;

        root  /var/www/public;
        index index.html index.php;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Laravel API — proxea a PHP-FPM
        location /api/ {
            try_files $uri /index.php?$query_string;
        }

        # Storage público y Sanctum
        location ~ ^/(storage|sanctum)/ {
            try_files $uri /index.php?$query_string;
        }

        # Assets de Vite (hashed) — cache largo
        location ~* ^/assets/.+\.(js|css|woff2?|ttf|svg|png|jpe?g|gif|webp|avif|ico)$ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Ejecución PHP (vía try_files interna)
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass  php-fpm;
            fastcgi_index index.php;
            include       fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT   $realpath_root;
            fastcgi_param HTTPS           on;
            fastcgi_read_timeout 300;
        }

        # Bloquea dotfiles
        location ~ /\.(?!well-known).* {
            deny all;
            access_log off;
        }

        # SPA fallback — todo lo demás va a index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
